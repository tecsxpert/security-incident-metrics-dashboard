services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ai-service:
    build:
      context: ./ai-service
    environment:
      PORT: "5000"
      LOG_LEVEL: INFO
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: llama-3.3-70b-versatile
      GROQ_TIMEOUT_SECONDS: "10"
      GROQ_RETRY_ATTEMPTS: "3"
      GROQ_RETRY_BACKOFF_SECONDS: "0.5"
      AI_RESPONSE_TIMEOUT_SECONDS: "20"
      REDIS_CACHE_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=2)); raise SystemExit(0 if data.get('success') and data.get('data', {}).get('status') == 'ok' else 1)"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
